<header class="portfolio-header">

  <ion-toolbar class="desktop-toolbar">

    <ion-buttons slot="start" class="mobile-menu-btn">

      <ion-menu-button menu="portfolio-menu">
      </ion-menu-button>

    </ion-buttons>

    <div class="header-scroll">

      @for(item of items; track item.side) {

        <ion-button
          fill="clear"
          class="menu-btn"
          [class.active]="currentSide === item.side"
          (click)="onSelect(item.side)">

          {{ item.label }}

        </ion-button>

      }

    </div>

  </ion-toolbar>

</header>
